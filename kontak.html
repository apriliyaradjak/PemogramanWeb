<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Kontak - Apriliya A Radjak</title>
<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
display:flex;
background:white;
padding:30px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.tugas{
width:200px;
height:250px;
background:#6b6b6b;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
clip-path: polygon(0 0, 85% 0, 100% 50%, 85% 100%, 0 100%);
margin-right:40px;
}

.form-area{
width:300px;
}

h1{
text-align:center;
margin-bottom:5px;
}

.back{
display:block;
text-align:center;
margin-bottom:15px;
color:blue;
}

label{
display:block;
margin-top:10px;
}

input, select, textarea{
width:100%;
padding:6px;
margin-top:4px;
}

button{
margin-top:10px;
padding:8px 15px;
}

footer{
text-align:center;
margin-top:10px;
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<div class="tugas">
Tugas
</div>

<div class="form-area">

<h1>Form Kontak</h1>

<a href="index.html" class="back">Kembali ke Portfolio</a>

<h3>Hubungi Saya</h3>

<form>

<label>Nama Lengkap</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Nomor HP</label>
<input type="text">

<label>Subject</label>
<select>
<option>Kerjasama</option>
<option>Pertanyaan</option>
<option>Lainnya</option>
</select>

<label>Pesan</label>
<textarea rows="4"></textarea>

<br>

<input type="checkbox"> Saya menyetujui pengiriman data

<br>

<button type="submit">Kirim Pesan</button>

</form>

<footer>
© 2026 Apriliya A Radjak
</footer>

</div>

</div>

</body>
</html>
